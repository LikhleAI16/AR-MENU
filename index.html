<!DOCTYPE html>
<html>
<head>
  <title>AR Menu</title>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>

  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.0/aframe/build/aframe-ar.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: transparent !important;
    }

    /* Force camera to show properly */
    .a-canvas {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
    }

    video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      z-index: -1 !important;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }

    /* Welcome screen */
    #welcome-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      text-align: center;
      padding: 30px;
    }

    #welcome-screen .logo {
      font-size: 60px;
      margin-bottom: 10px;
    }

    #welcome-screen h1 {
      color: #FFD700;
      font-size: 26px;
      margin-bottom: 8px;
    }

    #welcome-screen h2 {
      color: white;
      font-size: 16px;
      font-weight: normal;
      margin-bottom: 30px;
      opacity: 0.8;
    }

    .instruction-box {
      background: rgba(255,255,255,0.1);
      border: 2px solid #FFD700;
      border-radius: 20px;
      padding: 25px 30px;
      margin-bottom: 30px;
      width: 100%;
    }

    .instruction-box p {
      color: white;
      font-size: 15px;
      line-height: 1.9;
      margin: 4px 0;
    }

    .instruction-box .step {
      color: #FFD700;
      font-weight: bold;
      font-size: 16px;
    }

    #start-btn {
      background: #FFD700;
      color: #1a1a2e;
      border: none;
      padding: 16px 50px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%   { transform: scale(1);    box-shadow: 0 0 0 0 rgba(255,215,0,0.5); }
      70%  { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(255,215,0,0); }
      100% { transform: scale(1);    box-shadow: 0 0 0 0 rgba(255,215,0,0); }
    }

    .footer-text {
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      margin-top: 20px;
    }

    /* Scan instruction top bar */
    #scan-instruction {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(135deg, #1a1a2e, #0f3460);
      color: white;
      padding: 15px;
      text-align: center;
      z-index: 9999;
      display: none;
    }

    #scan-instruction h3 {
      color: #FFD700;
      font-size: 16px;
      margin-bottom: 4px;
    }

    #scan-instruction p {
      font-size: 12px;
      opacity: 0.85;
    }

    /* Animated scanning frame */
    #scan-frame {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 200px;
      height: 200px;
      z-index: 9998;
      display: none;
    }

    #scan-frame .corner {
      position: absolute;
      width: 40px;
      height: 40px;
      border-color: #FFD700;
      border-style: solid;
    }

    #scan-frame .corner.tl {
      top: 0; left: 0;
      border-width: 4px 0 0 4px;
      border-radius: 8px 0 0 0;
    }

    #scan-frame .corner.tr {
      top: 0; right: 0;
      border-width: 4px 4px 0 0;
      border-radius: 0 8px 0 0;
    }

    #scan-frame .corner.bl {
      bottom: 0; left: 0;
      border-width: 0 0 4px 4px;
      border-radius: 0 0 0 8px;
    }

    #scan-frame .corner.br {
      bottom: 0; right: 0;
      border-width: 0 4px 4px 0;
      border-radius: 0 0 8px 0;
    }

    #scan-frame .scan-line {
      position: absolute;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, transparent, #FFD700, transparent);
      animation: scanline 2s linear infinite;
      top: 0;
    }

    @keyframes scanline {
      0%   { top: 0%; }
      100% { top: 100%; }
    }

    /* Dish info card */
    #dish-card {
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.90);
      color: white;
      padding: 20px 25px;
      border-radius: 20px;
      border: 1px solid #FFD700;
      text-align: center;
      display: none;
      z-index: 9999;
      width: 88%;
    }

    #dish-card h2 {
      margin: 0 0 8px 0;
      font-size: 20px;
      color: #FFD700;
    }

    #dish-card .price {
      font-size: 20px;
      color: #90EE90;
      font-weight: bold;
      margin: 8px 0;
    }

    #dish-card p {
      margin: 6px 0;
      font-size: 13px;
      color: #ddd;
      line-height: 1.5;
    }

    #close-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      color: #FFD700;
      font-size: 22px;
      cursor: pointer;
    }

    /* Bottom restaurant bar */
    #restaurant-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: rgba(255,140,0,0.95);
      color: white;
      padding: 10px;
      text-align: center;
      font-size: 14px;
      font-weight: bold;
      z-index: 9997;
      display: none;
    }
  </style>
</head>

<body>

  <!-- WELCOME SCREEN -->
  <div id="welcome-screen">
    <div class="logo">🍽️</div>
    <h1 id="welcome-name">Sharma Dhaba</h1>
    <h2>Welcome to our AR Menu!</h2>

    <div class="instruction-box">
      <p><span class="step">How to use:</span></p>
      <p>📱 Tap the button below</p>
      <p>📷 Camera will open</p>
      <p>🔍 Point camera at the</p>
      <p><strong style="color:#FFD700;">
        QR code next to any dish
      </strong></p>
      <p>✨ Watch the dish appear in AR!</p>
    </div>

    <button id="start-btn" onclick="startAR()">
      📷 Open AR Camera
    </button>

    <p class="footer-text">
      Point at dish QR codes on menu card
    </p>
  </div>

  <!-- SCAN INSTRUCTION -->
  <div id="scan-instruction">
    <h3>📷 Point camera at a dish QR code</h3>
    <p>Hold steady • Good lighting helps</p>
  </div>

  <!-- SCANNING FRAME -->
  <div id="scan-frame">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="scan-line"></div>
  </div>

  <!-- DISH INFO CARD -->
  <div id="dish-card">
    <span id="close-btn" onclick="hideDishCard()">✕</span>
    <h2 id="dish-name"></h2>
    <p class="price" id="dish-price"></p>
    <p id="dish-ingredients"></p>
    <p id="dish-description"></p>
  </div>

  <!-- BOTTOM BAR -->
  <div id="restaurant-bar"></div>

  <!-- AR SCENE -->
  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; alpha: true; antialias: true"
    arjs="sourceType: webcam;
          videoTexture: true;
          debugUIEnabled: false;
          detectionMode: mono_and_matrix;
          matrixCodeType: 3x3;">

    <!-- DISH 1 — value 1 -->
    <a-marker type="barcode" value="1" id="marker-1">
      <a-image
        src="photos/biryani.jpg"
        position="0 0.1 0"
        rotation="-90 0 0"
        width="1.5"
        height="1.5">
      </a-image>
      <a-text
        value="Chicken Biryani"
        position="0 0.1 1.0"
        rotation="-90 0 0"
        align="center"
        color="#FFD700"
        width="3">
      </a-text>
    </a-marker>

    <!-- DISH 2 — value 2 -->
    <a-marker type="barcode" value="2" id="marker-2">
      <a-image
        src="photos/paneer.jpg"
        position="0 0.1 0"
        rotation="-90 0 0"
        width="1.5"
        height="1.5">
      </a-image>
      <a-text
        value="Paneer Masala"
        position="0 0.1 1.0"
        rotation="-90 0 0"
        align="center"
        color="#FFD700"
        width="3">
      </a-text>
    </a-marker>

    <!-- DISH 3 — value 3 -->
    <a-marker type="barcode" value="3" id="marker-3">
      <a-image
        src="photos/dal.jpg"
        position="0 0.1 0"
        rotation="-90 0 0"
        width="1.5"
        height="1.5">
      </a-image>
      <a-text
        value="Dal Makhani"
        position="0 0.1 1.0"
        rotation="-90 0 0"
        align="center"
        color="#FFD700"
        width="3">
      </a-text>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    fetch('menu.json')
      .then(function(res) { return res.json(); })
      .then(function(menuData) {

        document.getElementById('welcome-name')
          .textContent = menuData.restaurant;

        document.getElementById('restaurant-bar')
          .textContent = '🍽️ ' + menuData.restaurant;

        menuData.dishes.forEach(function(dish) {
          var marker = document.getElementById('marker-' + dish.id);
          if (marker) {
            marker.addEventListener('markerFound', function() {
              showDishCard(dish);
            });
            marker.addEventListener('markerLost', function() {
              hideDishCard();
            });
          }
        });
      })
      .catch(function(err) {
        console.log('Error:', err);
      });

    function startAR() {
      document.getElementById('welcome-screen')
        .style.display = 'none';
      document.getElementById('scan-instruction')
        .style.display = 'block';
      document.getElementById('scan-frame')
        .style.display = 'block';
      document.getElementById('restaurant-bar')
        .style.display = 'block';
    }

    function showDishCard(dish) {
      document.getElementById('dish-card')
        .style.display = 'block';
      document.getElementById('scan-frame')
        .style.display = 'none';
      document.getElementById('dish-name')
        .textContent = dish.name;
      document.getElementById('dish-price')
        .textContent = '💰 ' + dish.price;
      document.getElementById('dish-ingredients')
        .textContent = '🥘 ' + dish.ingredients;
      document.getElementById('dish-description')
        .textContent = '📝 ' + dish.description;
    }

    function hideDishCard() {
      document.getElementById('dish-card')
        .style.display = 'none';
      document.getElementById('scan-frame')
        .style.display = 'block';
    }
  </script>

</body>
    </html>
